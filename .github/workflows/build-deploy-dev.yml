name: Build & Deploy DEV

on:
  push:
    branches:
      - develop
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.41.4'
  JAVA_VERSION: '17'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK (DEV)
        run: flutter build apk --release --flavor dev -t lib/main_dev.dart
      
      - name: Deploy to Firebase App Distribution (Android)
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_ANDROID_DEV }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          file: build/app/outputs/flutter-apk/app-dev-release.apk
          groups: dev-testers

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Set up iOS build
        run: |
          cd ios
          pod install
          cd ..
      
      - name: Build iOS app (DEV)
        run: flutter build ios --release --flavor dev -t lib/main_dev.dart --no-codesign
      
      - name: Deploy to Firebase App Distribution (iOS)
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_IOS_DEV }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          file: build/ios/iphoneos/Runner.ipa
          groups: dev-testers
